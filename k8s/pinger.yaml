apiVersion: apps/v1
kind: Deployment
metadata:
  name: pinger-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pinger
  template:
    metadata:
      labels:
        app: pinger
    spec:
      containers:
        - name: pinger
          image: gsis-monitor-pinger:latest
          imagePullPolicy: Never
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: gsis-monitor-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: gsis-monitor-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: gsis-monitor-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: gsis-monitor-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gsis-monitor-secret
                  key: DB_PASSWORD
